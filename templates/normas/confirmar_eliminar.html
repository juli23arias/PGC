{% extends 'base.html' %}

{% block title %}Eliminar Norma - Vías Seguras{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card text-center">
                <div class="card-body p-5">
                    <div class="text-danger mb-3">
                        <i class="bi bi-exclamation-triangle-fill" style="font-size:4rem;"></i>
                    </div>
                    <h3 class="fw-bold">¿Eliminar norma?</h3>
                    <p class="text-muted mb-1">Estás a punto de eliminar:</p>
                    <p class="fw-semibold fs-5 mb-4">"{{ norma.titulo }}"</p>
                    <div class="d-flex gap-3 justify-content-center">
                        <form method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger px-4">
                                <i class="bi bi-trash me-2"></i>Sí, eliminar
                            </button>
                        </form>
                        <a href="/normas/norma/{{ norma.pk }}/" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-x me-2"></i>Cancelar
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
